appId: dev.privy.example
---

# Log in first
- runFlow: login.yaml

# Verify the chat screen renders with empty state
- assertVisible: "Start a conversation"

# Type a message and verify input
- tapOn:
    id: "chat-input"
- inputText: "Hello"
- assertVisible: "Hello"

# Send the message
- tapOn:
    id: "send-button"

# Verify user message appears and input clears
- assertVisible: "Hello"
- assertNotVisible: "Start a conversation"
