name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install SDK from npm (CI can't use local link)
        run: |
          pnpm remove @anuma/sdk
          pnpm add @anuma/sdk@next

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check
        run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Enable Corepack
        run: corepack enable

      - name: Install SDK from npm (CI can't use local link)
        run: |
          pnpm remove @anuma/sdk
          pnpm add @anuma/sdk@next

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint
